<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cricket 300 Draft</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef3ee;
      color: #16201a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(560px, calc(100vw - 32px));
      border: 1px solid #d8e1da;
      border-radius: 8px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(20, 35, 26, .12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #617067;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>Cricket 300 Draft</h1>
    <p>Loading the draft simulator...</p>
  </main>
  <script>
    fetch("app.txt", { cache: "no-store" }).then((response) => {
      if (!response.ok) throw new Error("Could not load app payload");
      if (!("DecompressionStream" in window)) throw new Error("This browser cannot decompress the simulator payload");
      return response.text();
    }).then(async (payload) => {
      const binary = atob(payload.replace(/\s+/g, ""));
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
      const html = await new Response(stream).text();
      document.open();
      document.write(html);
      document.close();
    }).catch((error) => {
      document.querySelector("p").textContent = `The simulator could not be loaded: ${error.message}`;
    });
  </script>
</body>
</html>
